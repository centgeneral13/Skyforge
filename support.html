<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Skyforge Support</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#060816] text-white overflow-x-hidden">

  <!-- NAVBAR -->

  <header class="sticky top-0 z-50 backdrop-blur-md bg-black/30">

    <nav class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between px-6 py-5 gap-5">

      <h1 class="text-2xl font-bold tracking-[0.3em] text-cyan-300">
        SKYFORGE
      </h1>

      <ul class="flex flex-wrap justify-center gap-6 text-sm md:text-base">

        <li>
          <a href="index.html" class="hover:text-cyan-300 transition">
            Home
          </a>
        </li>

        <li>
          <a href="shop.html" class="hover:text-cyan-300 transition">
            Shop
          </a>
        </li>

        <li>
          <a href="about.html" class="hover:text-cyan-300 transition">
            About
          </a>
        </li>

        <li>
          <a href="support.html" class="text-cyan-300">
            Support
          </a>
        </li>

      </ul>

    </nav>

  </header>

  <!-- HEADER -->

  <section class="py-24 px-6 text-center">

    <h1 class="text-6xl font-bold mb-8">
      Support
    </h1>

    <p class="text-gray-400 text-xl max-w-3xl mx-auto leading-relaxed">
      Need help with your order, custom drone build,
      shipping, or technical setup? Contact the
      Skyforge support team below.
    </p>

  </section>

  <!-- SUPPORT FORM -->

  <section class="max-w-4xl mx-auto px-6 pb-24">

    <form
      action="https://formspree.io/f/mdajjerq"
      method="POST"
      class="bg-[#101528] rounded-3xl p-8 space-y-6"
    >

      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
        class="w-full bg-[#0b1120] p-4 rounded-xl"
      >

      <input
        type="email"
        name="email"
        placeholder="Email Address"
        required
        class="w-full bg-[#0b1120] p-4 rounded-xl"
      >

      <select
        name="supportType"
        class="w-full bg-[#0b1120] p-4 rounded-xl"
      >

        <option>Order Help</option>
        <option>Shipping Question</option>
        <option>Custom Build Support</option>
        <option>Technical Problem</option>
        <option>General Question</option>

      </select>

      <textarea
        name="message"
        rows="6"
        placeholder="Describe your issue or question..."
        required
        class="w-full bg-[#0b1120] p-4 rounded-xl"
      ></textarea>

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-blue-500 to-pink-500 py-4 rounded-xl text-lg font-semibold hover:scale-[1.02] transition"
      >
        Contact Support
      </button>

    </form>

  </section>

</body>
</html>
